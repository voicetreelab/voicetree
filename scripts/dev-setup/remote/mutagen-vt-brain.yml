# Two-way-safe sync for global VoiceTree brain coordination artifacts.
#
# This deliberately does NOT target /root/voicetree-public/brain because the
# main vt-remote session is one-way Mac -> devbox for the whole repo checkout.
# A separate target avoids two Mutagen sessions writing the same tree.
sync:
  defaults:
    mode: "two-way-safe"
    symlink:
      mode: "posix-raw"
    ignore:
      # Keep the devbox target as a synced working tree, not a second Git repo.
      # Git history remains owned by the Mac-side brain checkout.
      vcs: true
      paths:
        - "**/.DS_Store"
        - "**/*.log"
        - "**/*.tmp"
        - "**/*.swp"
        - "**/*~"
