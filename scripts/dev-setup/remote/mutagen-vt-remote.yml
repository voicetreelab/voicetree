sync:
  defaults:
    mode: "one-way-replica"
    symlink:
      mode: "posix-raw"
    ignore:
      vcs: false
      paths:
        - "**/node_modules"
        - "**/node_modules*"
        - "**/*node_modules*"
        - "**/.node_modules-*"
        - "**/*.node_modules-*"
        - "**/.stryker-tmp"
        - "**/*.stryker-tmp*"
        - "**/dist"
        - "**/dist*"
        - "**/dist-electron"
        - "**/*dist-electron*"
        - "**/dist-web"
        - "**/*dist-web*"
        - "**/playwright-report*"
        - "**/*playwright-report*"
        - "**/test-results"
        - "**/*test-results*"
        - "**/.next"
        - "**/*.next*"
        - "**/.turbo"
        - "**/*.turbo*"
        - "**/.cache"
        - "**/*.cache*"
        - "**/.DS_Store"
        - "**/*.DS_Store*"
        - "**/*.log"
        - "**/*.db"
        - "**/*.db-*"
        - "**/*.sqlite"
        - "**/*.sqlite-*"
        - "**/*.sqlite3"
        - "**/*.sqlite3-*"
        - "**/*.wal"
        - "**/*.shm"
        - "**/*.parquet"
        - "**/*.pprof"
        - "**/*.heapprofile"
        - "**/*.heapsnapshot"
        - "**/*.trace"
        - "**/*.har"
        - "**/*.ndjson"
        - "**/*.prom"
        - "**/*.tsdb"
        - "**/folder-visibility.db*"
        - "**/*folder-visibility.db*"
        - "infra/perf-stack/bin"
        - "infra/perf-stack/bin/**"
        - "infra/perf-stack/storage"
        - "infra/perf-stack/storage/**"
        - "out"
        - "/meta"
        - "voicetree-evals"
        - "vt-website-quartz"
        - "old"
        - "webapp/e2e-tests/perf-traces"
        - "webapp/e2e-tests/perf-traces/**"
        - "webapp/e2e-tests/screenshots"
        - "webapp/e2e-tests/screenshots/**"
        - "**/.voicetree/devbox-outputs"
        - "**/.voicetree/devbox-outputs/**"
        - "**/*devbox-outputs*"
        # Machine-local build caches (e.g. the name-uniqueness declaration
        # index). These are keyed to the machine's absolute checkout paths
        # and rebuilt on demand — syncing them between the local mac and the
        # devbox makes a check read another machine's cache and (with the old
        # behaviour) flag a file as colliding with its own cross-root copy.
        # Each machine must own its own cache.
        - "**/.voicetree/cache"
        - "**/.voicetree/cache/**"
        # health-dashboard/reports/ is owned by two SEPARATE sessions:
        #   - vt-csv-history (two-way-safe) owns scores-history/
        #   - vt-reports (one-way-replica, remote-alpha) owns the generated
        #     JSON reports (latest.json, *.json, etc.)
        # This one-way-replica (local→remote) must not touch reports/ at all:
        # it would clobber remote-generated JSON with the (empty) local copy
        # and overwrite devbox-appended score rows in scores-history/.
        - "health-dashboard/reports"
        - "health-dashboard/reports/**"
        # Legacy nested worktrees: migrated to sibling <parent>/vt-wts/ layout,
        # synced by the separate vt-wts mutagen session. Excluding here prevents
        # any straggler `.worktrees/<name>` (e.g. a worktree blocked from
        # migration by uncommitted changes) from re-introducing the
        # double-sync + scanner-exclude class of bug the migration killed.
        - ".worktrees"
        - ".worktrees/**"
        # Agent-spawned nested worktree mirrors (also gitignored locally).
        - ".claude/worktrees"
        - ".claude/worktrees/**"
        - ".venv"
        - "**/*.venv*"
        - ".venv-server"
        - ".codeql"
        - "**/*.codeql*"
        - "brain/workflows/evaluation"
        - "webapp/workers"
        # .git/index IS synced so pre-commit can read the locally-staged tree
        # from the devbox. The matching .lock paths stay ignored — they're
        # atomic-write tempfiles, and syncing them would race with local git.
        - ".git/index.lock"
        - ".git/worktrees/*/index.lock"
        - ".git/*.lock"
        - ".git/refs/**/*.lock"
        - ".git/hooks"
        - ".git/config"
        - ".git/logs"
        - ".git/COMMIT_EDITMSG"
        - ".git/FETCH_HEAD"
        - ".git/ORIG_HEAD"
        - "**/.voicetree/graphd.owner.json"
