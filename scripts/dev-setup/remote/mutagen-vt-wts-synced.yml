# One-way-replica sync for the Mac-owned `vt-wts-synced/` worktree root.
#
# Why a SECOND session (not a config on `vt-remote`):
#   - `vt-remote` syncs the Mac checkout `~/repos/vtrepo/` ↔ `/root/vtrepo-synced/`.
#     A single mutagen session can only sync one path pair.
#   - Worktrees live OUTSIDE the main checkout, under a dedicated root. The
#     `-synced` suffix marks "part of this mirror" — the SAME basename on both
#     ends. That second tree needs its own pair:
#         ~/repos/vt-wts-synced       ↔ /root/vt-wts-synced
#   - Same mode as vt-remote (one-way-replica) because `scripts/run-remote.mjs`
#     enforces that mode before remote execution.
#   - Tuning knob: worktrees see heavier churn than the main checkout, so the
#     ignore list below is leaner — we don't sync build outputs that the
#     worktree won't need on remote.
#
# Lifecycle commands live in `scripts/dev-setup/remote/vt-remote.sh`:
#   vt-remote.sh vt-wts-synced-create
#   vt-remote.sh vt-wts-synced-status
#   vt-remote.sh vt-wts-synced-terminate
sync:
  defaults:
    mode: "one-way-replica"
    symlink:
      mode: "posix-raw"
    ignore:
      vcs: false
      paths:
        - "**/node_modules"
        - "**/node_modules*"
        - "**/*node_modules*"
        - "**/.node_modules-*"
        - "**/*.node_modules-*"
        - "**/.stryker-tmp"
        - "**/*.stryker-tmp*"
        - "**/dist"
        - "**/dist*"
        - "**/dist-electron"
        - "**/*dist-electron*"
        - "**/dist-web"
        - "**/*dist-web*"
        - "**/playwright-report*"
        - "**/*playwright-report*"
        - "**/test-results"
        - "**/*test-results*"
        - "**/.next"
        - "**/*.next*"
        - "**/.turbo"
        - "**/*.turbo*"
        - "**/.cache"
        - "**/*.cache*"
        - "**/.DS_Store"
        - "**/*.DS_Store*"
        # .env is machine-local config (notably VT_REMOTE_HOST) — never mirror it
        # to the replica (see mutagen-vt-remote.yml for the self-routing footgun).
        - ".env"
        - "**/.env"
        - "**/*.log"
        - "**/folder-visibility.db*"
        - "**/*folder-visibility.db*"
        - "**/.voicetree/graphd.owner.json"
        # Each worktree's `.git` is a *file* (gitdir pointer), not a directory,
        # and it is MACHINE-SPECIFIC: it names the main checkout by basename
        # (`gitdir: ../../vtrepo/...` on the Mac vs `../../vtrepo-synced/...` on
        # the devbox, whose main checkout dir differs). Mirroring it writes the
        # Mac path onto the devbox — breaking `git -C <worktree>` there — and a
        # one-way-replica cycle would re-clobber any remote repair. So never
        # sync it: scripts/run-remote.mjs materializes the correct devbox
        # pointer (repairRemoteWorktreeMetadataScript) before each command.
        # The admin-side gitdir/commondir under the main checkout's
        # .git/worktrees/<name>/ ARE relative + identical across the mirror, so
        # they sync correctly via the vt-remote session.
        - "**/.git"
