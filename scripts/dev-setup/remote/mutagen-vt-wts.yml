# One-way-replica sync for the sibling vt-wts/ directory that holds all linked
# git worktrees.
#
# Why a SECOND session (not a config on `vt-remote`):
#   - `vt-remote` syncs the main checkout `<repo>/voicetree-public/` ↔ `/root/voicetree-public/`.
#     A single mutagen session can only sync one path pair.
#   - Worktrees moved out of `<repo>/.worktrees/` (nested) into the sibling
#     `<parent>/vt-wts/<name>/`. That second tree needs its own pair:
#         /Users/.../vt-wts            ↔ /root/vt-wts
#   - Same mode as vt-remote (one-way-replica) because `scripts/run-remote.mjs`
#     enforces that mode before remote execution.
#   - Tuning knob: worktrees see heavier churn than the main checkout, so the
#     ignore list below is leaner — we don't sync build outputs that the
#     worktree won't need on remote.
#
# Lifecycle commands live in `scripts/dev-setup/remote/vt-remote.sh`:
#   vt-remote.sh vt-wts-create
#   vt-remote.sh vt-wts-status
#   vt-remote.sh vt-wts-terminate
sync:
  defaults:
    mode: "one-way-replica"
    symlink:
      mode: "posix-raw"
    ignore:
      vcs: false
      paths:
        - "**/node_modules"
        - "**/.node_modules-*"
        - "**/.stryker-tmp"
        - "**/dist"
        - "**/dist-electron"
        - "**/dist-web"
        - "**/playwright-report*"
        - "**/test-results"
        - "**/.next"
        - "**/.turbo"
        - "**/.cache"
        - "**/.DS_Store"
        - "**/*.log"
        - "**/folder-visibility.db*"
        - "**/.voicetree/graphd.owner.json"
        # Worktree `.git` is a *file* (gitdir pointer), not a directory.
        # Sync the file itself so the worktree is usable on remote, but
        # ignore lock/index churn that would conflict with local git work.
        - ".git/index"
        - ".git/index.lock"
        - ".git/*.lock"
