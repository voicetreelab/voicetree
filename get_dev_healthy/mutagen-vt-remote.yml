sync:
  defaults:
    mode: "one-way-replica"
    symlink:
      mode: "posix-raw"
    ignore:
      vcs: false
      paths:
        - "**/node_modules"
        - "**/.node_modules-*"
        - "**/dist"
        - "**/dist-electron"
        - "**/dist-web"
        - "**/playwright-report*"
        - "**/test-results"
        - "**/.next"
        - "**/.turbo"
        - "**/.cache"
        - "**/.DS_Store"
        - "**/*.log"
        - "**/folder-visibility.db*"
        - "out"
        - "/meta"
        - "voicetree-evals"
        - "vt-website-quartz"
        - "old"
        - "webapp/e2e-tests/perf-traces"
        - "webapp/e2e-tests/screenshots"
        - "health-dashboard/reports"
        - ".venv"
        - ".venv-server"
        - ".codeql"
        - "brain/workflows/evaluation"
        - "webapp/workers"
        - ".git/index"
        - ".git/index.lock"
        - ".git/worktrees/*/index"
        - ".git/worktrees/*/index.lock"
        - ".git/*.lock"
        - ".git/refs/**/*.lock"
        - ".git/hooks"
        - ".git/config"
        - ".git/logs"
        - ".git/COMMIT_EDITMSG"
        - ".git/FETCH_HEAD"
        - ".git/ORIG_HEAD"
        - ".git/MERGE_HEAD"
        - ".git/MERGE_MSG"
        - ".git/AUTO_MERGE"
        - ".git/CHERRY_PICK_HEAD"
        - ".git/REVERT_HEAD"
        - "**/.voicetree/graphd.owner.json"
