name: Branch Verification

on:
  workflow_dispatch:
    inputs:
      run_electron_tier2:
        description: 'Run Electron Tier 2 as well as browser Tier 2'
        type: boolean
        default: false

concurrency:
  group: branch-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      # tier<=2 includes the tier-1 duplication health gates, which shell out to
      # the native vt-dup binary; build it (cached) first. ubuntu-latest ships a
      # stable Rust toolchain.
      - name: Cache vt-dup Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/measures/native/vt-dup/target
          key: ${{ runner.os }}-cargo-vt-dup-${{ hashFiles('packages/measures/native/vt-dup/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-vt-dup-

      - name: Build vt-dup native binary
        run: pnpm --filter @vt/measures run measures:build-native:local

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run tier 2 checks
        run: npm run test:t2

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "Static gates failed"

  browser-smoke:
    needs: [static-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright browser dependencies
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 2 E2E (critical_for_verification)
        timeout-minutes: 10
        working-directory: webapp
        run: npx playwright test --config=playwright-ci-smoke.config.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ci-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

      - name: Run browser Tier 2 E2E
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_electron_tier2 }}
        timeout-minutes: 25
        run: npm --workspace webapp run test:browser

      - name: Run Electron Tier 2 E2E
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_electron_tier2 }}
        run: xvfb-run --auto-servernum npm --workspace webapp run test:e2e

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "Browser smoke failed"

  browser-daemon-roundtrip:
    needs: [static-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright browser dependencies
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      # tmux is the relay backend (attachTmuxSessionToWebSocket) and is NOT
      # preinstalled on ubuntu-latest. Without it the round-trip WS closes with
      # "tmux session check failed". vtd runs under plain node via tsx (not
      # Electron), so node-pty's default npm-ci node build is correct — no
      # @electron/rebuild here (that is electron-smoke only).
      - name: Install tmux (relay backend)
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Pre-warm tsx JIT (graphd + vtd source bins)
        run: scripts/ci/prewarm-daemons.sh || true

      - name: Browser daemon round-trip E2E
        timeout-minutes: 15
        working-directory: webapp
        run: npx playwright test --config=playwright-browser-daemon.config.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-browser-daemon-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "Browser daemon round-trip failed"

  electron-smoke:
    needs: [static-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Build vt-fake-agent
        working-directory: tools/vt-fake-agent
        run: npm install && npx tsc

      - name: Pre-warm graph daemon (tsx JIT compile)
        run: |
          mkdir -p /tmp/daemon-warmup/.voicetree
          echo "# warmup" > /tmp/daemon-warmup/root.md
          TSX_PATH=$(node -e "console.log(require.resolve('tsx'))")
          timeout 30 node --import "$TSX_PATH" \
            packages/systems/graph-db-server/bin/vt-graphd.ts \
            --project /tmp/daemon-warmup --idle-timeout-ms 3000 || true
          rm -rf /tmp/daemon-warmup

      - name: Run Electron Tier 1 smoke tests
        timeout-minutes: 10
        working-directory: webapp
        env:
          CI: 'true'
          PLAYWRIGHT_QUIET: 'false'
        run: |
          xvfb-run --auto-servernum npx playwright test \
            --config=playwright-tier1-system.config.ts

      - name: Upload Electron test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report-tier1-system/
          retention-days: 7

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "Electron smoke failed"
