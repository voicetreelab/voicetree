name: Docker image

on:
  release:
    types: [published]
  pull_request:
    branches: [dev]
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      voicetree_version:
        description: 'VoiceTree release tag to bake into the image (e.g. v2.9.16 or "latest")'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/voicetree

jobs:
  # Per-arch build on a native runner. PRs build a single-arch image,
  # load it locally, and smoke-test it. Release/manual runs push each arch
  # as a digest-only image; the merge job below assembles the multi-arch
  # manifest list.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runs-on: ubuntu-latest,    arch_suffix: amd64 }
          - { platform: linux/arm64, runs-on: ubuntu-24.04-arm, arch_suffix: arm64 }
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve VoiceTree version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.voicetree_version || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR builds: load the per-arch image locally and smoke-test it.
      - name: Build & load (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ matrix.arch_suffix }}
          build-args: |
            VOICETREE_VERSION=${{ steps.ver.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.arch_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_suffix }}

      - name: Smoke test (PR)
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ matrix.arch_suffix }}
          BOOT_TIMEOUT: 120
        run: bash docker/test/smoke.sh

      # Release/manual: push by digest only. The merge job stitches the
      # per-arch digests into a single multi-arch tag below.
      - name: Build & push by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VOICETREE_VERSION=${{ steps.ver.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.arch_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_suffix }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch_suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble per-arch digests into the final multi-arch manifest list.
  # Only runs on release / workflow_dispatch.
  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Resolve VoiceTree version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.voicetree_version || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tags
        id: tags
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            CLEAN="${TAG#v}"
            echo "args=-t ${IMAGE}:${CLEAN} -t ${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "args=-t ${IMAGE}:manual-${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Verify
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            REF="${IMAGE}:${TAG#v}"
          else
            REF="${IMAGE}:manual-${TAG}"
          fi
          docker buildx imagetools inspect "$REF"
