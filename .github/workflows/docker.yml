name: Docker image

on:
  release:
    types: [published]
  pull_request:
    branches: [dev]
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      voicetree_version:
        description: 'VoiceTree release tag to bake into the image (e.g. v2.9.16 or "latest")'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/voicetree

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve VoiceTree version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            scripts/ci/resolve-docker-appimage.sh "${{ github.event.release.tag_name }}" "${{ github.event_name }}"
          else
            scripts/ci/resolve-docker-appimage.sh "${{ inputs.voicetree_version || 'latest' }}" "${{ github.event_name }}"
          fi

      - name: Compute image tags
        if: steps.ver.outputs.should_build == 'true'
        id: tags
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            # vX.Y.Z release: publish both :X.Y.Z and :latest
            CLEAN="${TAG#v}"
            echo "tags=${IMAGE}:${CLEAN},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR builds: build only, no push
            echo "tags=${IMAGE}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:manual-${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.ver.outputs.should_build == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (load locally, push on release / manual)
        if: steps.ver.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          # PRs: load only (no registry push). Release/manual: push.
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VOICETREE_VERSION=${{ steps.ver.outputs.tag }}
            VOICETREE_APPIMAGE_URL=${{ steps.ver.outputs.appimage_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: steps.ver.outputs.should_build == 'true' && github.event_name != 'release'
        env:
          IMAGE: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number || 'manual' }}
          BOOT_TIMEOUT: 120
        run: |
          # On workflow_dispatch the tag is :manual-<input>; pick whichever
          # tag is loaded.
          if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
              IMAGE=$(echo "${{ steps.tags.outputs.tags }}" | cut -d, -f1)
              export IMAGE
          fi
          echo "Smoke-testing image: $IMAGE"
          bash docker/test/smoke.sh

      - name: Explain skipped Docker image
        if: steps.ver.outputs.should_build == 'false'
        run: |
          echo "${{ steps.ver.outputs.skip_reason }}"
          {
            echo "## Docker image skipped"
            echo
            echo "${{ steps.ver.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "Docker image workflow failed"
