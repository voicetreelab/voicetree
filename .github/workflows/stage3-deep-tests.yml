name: "Stage 3: Deep Tests"

on:
  workflow_run:
    workflows: ["Stage 1: Fast Checks"]
    types: [completed]

jobs:
  fuzz-tests:
    name: Fuzz Tests
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.pull_requests[0].base.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Run fuzz tests
        run: npx vitest run --config vitest.config.fuzz.ts --reporter=verbose

  browser-tier2:
    name: Browser Tier 2 E2E
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.pull_requests[0].base.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 2 tests
        timeout-minutes: 20
        working-directory: webapp
        run: npx playwright test --config=playwright.config.ts --reporter=line

      - name: Upload browser Tier 2 artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-tier2-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  electron-tier2:
    name: Electron Tier 2 E2E
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.pull_requests[0].base.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Build vt-fake-agent
        working-directory: tools/vt-fake-agent
        run: npm install && npx tsc

      - name: Pre-warm graph daemon (tsx JIT compile)
        run: |
          mkdir -p /tmp/daemon-warmup/.voicetree
          echo "# warmup" > /tmp/daemon-warmup/root.md
          TSX_PATH=$(node -e "console.log(require.resolve('tsx'))")
          timeout 30 node --import "$TSX_PATH" \
            packages/systems/graph-db-server/bin/vt-graphd.ts \
            --vault /tmp/daemon-warmup --idle-timeout-ms 3000 || true
          rm -rf /tmp/daemon-warmup

      - name: Run Electron Tier 2 tests
        timeout-minutes: 30
        working-directory: webapp
        env:
          CI: 'true'
          PLAYWRIGHT_QUIET: 'false'
        run: |
          xvfb-run --auto-servernum npx playwright test \
            --config=playwright-electron.config.ts \
            --reporter=list

      - name: Upload Electron Tier 2 artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-tier2-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  mutation-testing:
    name: Mutation Testing
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.pull_requests[0].base.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run Stryker on graph-model
        working-directory: packages/libraries/graph-model
        run: npx stryker run

      - name: Run Stryker on graph-state
        working-directory: packages/libraries/graph-state
        run: npx stryker run

      - name: Check mutation scores
        run: |
          check_score() {
            local file=$1 name=$2 threshold=$3
            if [ ! -f "$file" ]; then
              echo "WARN: $name report not found, skipping"
              return 0
            fi
            score=$(node -e "
              const r = require('./$file');
              const files = Object.values(r.files || {});
              const killed = files.reduce((s,f) => s + f.killed, 0);
              const total = files.reduce((s,f) => s + f.killed + f.survived + f.noCoverage, 0);
              console.log(total > 0 ? Math.round(killed * 100 / total) : 100);
            ")
            echo "$name mutation score: ${score}%  (threshold: ${threshold}%)"
            if [ "$score" -lt "$threshold" ]; then
              echo "FAIL: $name mutation score ${score}% is below ${threshold}% threshold"
              return 1
            fi
          }
          check_score stryker-graph-model.json graph-model 70
          check_score stryker-graph-state.json graph-state 65

  codeql-measures:
    name: CodeQL Health Measures
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.pull_requests[0].base.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install gh codeql extension
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-codeql

      - name: Install qlpack dependencies
        working-directory: scripts/codeql
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh codeql pack install --mode=update

      - name: Run CodeQL health measures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run health:codeql

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-health-reports
          path: |
            health-dashboard/reports/transitive-impurity-*.json
            health-dashboard/reports/transitive-complexity-*.json
            health-dashboard/reports/semantic-coupling-*.json
          retention-days: 30
