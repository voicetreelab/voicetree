name: Build & Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'knip.config.ts'
      - 'webapp/package.json'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS (ARM64 + Intel)'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux x64'
        type: boolean
        default: true
      publish:
        description: 'Publish to the GitHub release + Homebrew (off = dry-run: build only, no release)'
        type: boolean
        default: false

jobs:
  # Release is deploy-only. Verification happens pre-merge in
  # `Measures (generated)`, including conditional Tier 4. The post-merge
  # nightly `Main CI / Full` provides the drift signal and staleness
  # denominator. Re-running `test:full` here before deploy is redundant.
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if version changed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - building"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$(jq -r .version webapp/package.json)" >> $GITHUB_OUTPUT
            exit 0
          fi
          NEW_VER=$(jq -r .version webapp/package.json)
          # Compare against commit before push, not just HEAD~1
          OLD_VER=$(git show ${{ github.event.before }}:webapp/package.json 2>/dev/null | jq -r .version || echo "0.0.0")
          echo "Current version: $NEW_VER"
          echo "Previous version (before push): $OLD_VER"
          WORKFLOW_CHANGED=false
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '.github/workflows/release.yml' 2>/dev/null | grep -q '.'; then
            WORKFLOW_CHANGED=true
          fi

          RELEASE_TAG_EXISTS=false
          if git rev-parse "v$NEW_VER" >/dev/null 2>&1; then
            RELEASE_TAG_EXISTS=true
          fi

          if [ "$NEW_VER" != "$OLD_VER" ]; then
            echo "Version changed: $OLD_VER -> $NEW_VER"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          elif [ "$WORKFLOW_CHANGED" = "true" ] && [ "$RELEASE_TAG_EXISTS" = "false" ]; then
            echo "Release workflow changed and tag v$NEW_VER is missing - bootstrapping build"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged and no bootstrap build needed, skipping build"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: [check-version]
    if: ${{ needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || inputs.build_mac) }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build Python server
        run: |
          uv venv .venv-server --python 3.13 --clear
          uv pip install --python .venv-server -r requirements-server.txt
          uv pip install --python .venv-server pyinstaller
          rm -rf out/build-mac out/dist-mac out/resources out/resources-intel
          .venv-server/bin/python -m PyInstaller scripts/server.spec --clean --distpath out/dist-mac --workpath out/build-mac
          # ARM builds go to out/resources/server, Intel builds go to out/resources-intel/server
          # This matches after-pack.cjs expectations which replaces server based on arch
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            mkdir -p out/resources/server
            cp -r out/dist-mac/voicetree-server/* out/resources/server/
          else
            mkdir -p out/resources-intel/server
            cp -r out/dist-mac/voicetree-server/* out/resources-intel/server/
            # Create placeholder for extraResources (after-pack.cjs will replace with Intel version)
            mkdir -p out/resources/server
            touch out/resources/server/.placeholder
          fi

      - name: Fix Python.framework structure for codesign
        run: |
          # PyInstaller creates duplicate dirs instead of proper macOS framework symlinks
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            SERVER_PATH="out/resources/server"
          else
            SERVER_PATH="out/resources-intel/server"
          fi
          rm -rf $SERVER_PATH/_internal/Python.framework/Versions/Current
          ln -s 3.13 $SERVER_PATH/_internal/Python.framework/Versions/Current
          rm -f $SERVER_PATH/_internal/Python.framework/Python
          ln -s Versions/Current/Python $SERVER_PATH/_internal/Python.framework/Python
          rm -rf $SERVER_PATH/_internal/Python.framework/Resources
          ln -s Versions/Current/Resources $SERVER_PATH/_internal/Python.framework/Resources

      - name: Copy tools and backend modules
        run: |
          mkdir -p out/resources/tools
          cp -r tools/* out/resources/tools/
          mkdir -p out/resources/backend
          cp -r backend/context_retrieval out/resources/backend/
          cp -r backend/markdown_tree_manager out/resources/backend/
          cp backend/__init__.py out/resources/backend/
          cp backend/types.py out/resources/backend/
          cp backend/settings.py out/resources/backend/
          cp backend/logging_config.py out/resources/backend/

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Update file timestamps for codesign
        run: |
          find out/resources -type f -exec touch {} +
          if [ -d "out/resources-intel" ]; then
            find out/resources-intel -type f -exec touch {} +
          fi

      - name: Build & Publish Electron app
        working-directory: webapp
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_SONIOX_API_KEY: ${{ secrets.VITE_SONIOX_API_KEY }}
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          npx electron-vite build
          npm run stage:daemons
          # Bundle the standalone Node ≥22 that hosts vtd/vt-graphd (Resources/node/node).
          # --arch is authoritative (the matrix target), not the runner's reported arch.
          npm run stage:node -- --arch ${{ matrix.arch }}
          # Notarization talks to Apple's live notary service and needs an in-effect
          # Developer Program agreement; it is irrelevant to build correctness. Skip it on
          # dry-runs (publish=false) so they validate build+sign+package without the Apple
          # round-trip; a real push/publish notarizes per the mac.notarize config.
          npx electron-builder --mac --${{ matrix.arch }} --publish=${{ (github.event_name == 'push' || inputs.publish) && 'always' || 'never' }} -c.electronVersion="$(node -p 'require("electron/package.json").version')" ${{ (github.event_name == 'push' || inputs.publish) && '' || '-c.mac.notarize=false' }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: ${{ github.workspace }}/out/electron/voicetree-${{ matrix.arch }}.dmg
          retention-days: 1

      - name: Upload update manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-mac-${{ matrix.arch }}
          path: ${{ github.workspace }}/out/electron/latest-mac.yml
          retention-days: 1

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "macOS release build failed"

  merge-mac-manifests:
    needs: [check-version, build-mac]
    if: ${{ needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || inputs.build_mac) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download manifests
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-mac-*
          path: manifests/

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Merge manifests
        run: |
          echo "ARM64 manifest:"
          cat manifests/manifest-mac-arm64/latest-mac.yml
          echo ""
          echo "x64 manifest:"
          cat manifests/manifest-mac-x64/latest-mac.yml
          echo ""

          # Merge files arrays from both manifests
          # Use fileIndex to select each document, capture files into variables, then combine
          yq eval-all '
            (select(fileIndex == 0) | .files) as $arm |
            (select(fileIndex == 1) | .files) as $x64 |
            select(fileIndex == 0) |
            .files = ($arm + $x64)
          ' manifests/manifest-mac-arm64/latest-mac.yml manifests/manifest-mac-x64/latest-mac.yml > latest-mac.yml

          echo "Merged manifest:"
          cat latest-mac.yml

      - name: Upload merged manifest to release
        if: ${{ github.event_name == 'push' || inputs.publish }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=$(yq '.version' latest-mac.yml)
          echo "Uploading merged manifest for v$VERSION"
          gh release upload "v$VERSION" latest-mac.yml --clobber --repo voicetreelab/voicetree

  build-windows:
    needs: [check-version]
    if: ${{ needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || inputs.build_windows) }}
    # Windows is unmaintained / unsigned for 3.0.0 — keep it non-blocking so a Windows
    # build failure can never block the mac + linux release (mirrors the linux-arm64
    # soft_fail). `publish-release` needs this job, and continue-on-error lets a failed
    # Windows build still satisfy that dependency. Flip back to blocking once Windows is
    # maintained again.
    continue-on-error: true
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build Python server
        shell: pwsh
        run: |
          uv venv .venv-server --python 3.13 --clear
          uv pip install --python .venv-server -r requirements-server.txt
          uv pip install --python .venv-server pyinstaller
          if (Test-Path "out\build-windows") { Remove-Item -Recurse -Force "out\build-windows" }
          if (Test-Path "out\dist-windows") { Remove-Item -Recurse -Force "out\dist-windows" }
          if (Test-Path "out\resources") { Remove-Item -Recurse -Force "out\resources" }
          & ".venv-server\Scripts\python.exe" -m PyInstaller scripts\server.spec --clean --distpath out\dist-windows --workpath out\build-windows
          New-Item -ItemType Directory -Force -Path "out\resources\server" | Out-Null
          Copy-Item -Recurse -Force "out\dist-windows\voicetree-server\*" "out\resources\server\"

      - name: Copy tools and backend
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "out\resources\tools" | Out-Null
          Copy-Item -Recurse -Force "tools\*" "out\resources\tools\"
          New-Item -ItemType Directory -Force -Path "out\resources\backend" | Out-Null
          Copy-Item -Recurse -Force "backend\context_retrieval" "out\resources\backend\"
          Copy-Item -Recurse -Force "backend\markdown_tree_manager" "out\resources\backend\"
          Copy-Item -Force "backend\__init__.py" "out\resources\backend\"
          Copy-Item -Force "backend\types.py" "out\resources\backend\"
          Copy-Item -Force "backend\settings.py" "out\resources\backend\"
          Copy-Item -Force "backend\logging_config.py" "out\resources\backend\"

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: webapp
        run: pnpm exec electron-rebuild

      - name: Build & Publish Electron
        working-directory: webapp
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_SONIOX_API_KEY: ${{ secrets.VITE_SONIOX_API_KEY }}
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          $ErrorActionPreference = "Stop"
          npx electron-vite build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\index.html")) {
            Write-Error "Build failed: dist\index.html not found"
            exit 1
          }
          npm run stage:daemons
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Bundle the standalone Node ≥22 host (Resources/node/node.exe). Windows is
          # out of scope for the app, but the node extraResource is shared, so stage it
          # to keep the build green.
          npm run stage:node -- --arch x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npx electron-builder --win --publish=${{ (github.event_name == 'push' || inputs.publish) && 'always' || 'never' }} -c.electronVersion="$(node -p 'require("electron/package.json").version')"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Summarize failure
        if: failure()
        shell: bash
        run: scripts/ci/write-failure-summary.sh "Windows release build failed"

  build-linux:
    needs: [check-version]
    if: ${{ needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || inputs.build_linux) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x64 is the critical path — if it fails the release fails.
          - { arch: x64,   runs-on: ubuntu-latest,    soft_fail: false }
          # arm64 is new; allowed to fail until proven stable. Flip
          # soft_fail to false once a few releases ship cleanly.
          - { arch: arm64, runs-on: ubuntu-24.04-arm, soft_fail: true  }
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.soft_fail }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build Python server
        run: |
          uv venv .venv-server --python 3.13 --clear
          uv pip install --python .venv-server -r requirements-server.txt
          uv pip install --python .venv-server pyinstaller
          rm -rf out/build-linux out/dist-linux out/resources
          .venv-server/bin/python -m PyInstaller scripts/server.spec --clean --distpath out/dist-linux --workpath out/build-linux
          mkdir -p out/resources/server
          cp -r out/dist-linux/voicetree-server/* out/resources/server/

      - name: Copy tools and backend
        run: |
          mkdir -p out/resources/tools
          cp -r tools/* out/resources/tools/
          mkdir -p out/resources/backend
          cp -r backend/context_retrieval out/resources/backend/
          cp -r backend/markdown_tree_manager out/resources/backend/
          cp backend/__init__.py out/resources/backend/
          cp backend/types.py out/resources/backend/
          cp backend/settings.py out/resources/backend/
          cp backend/logging_config.py out/resources/backend/

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build & Publish Electron
        working-directory: webapp
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_SONIOX_API_KEY: ${{ secrets.VITE_SONIOX_API_KEY }}
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          npx electron-vite build
          npm run stage:daemons
          # Bundle the standalone Node ≥22 that hosts vtd/vt-graphd (resources/node/node).
          npm run stage:node -- --arch ${{ matrix.arch }}
          npx electron-builder --linux --${{ matrix.arch }} --publish=${{ (github.event_name == 'push' || inputs.publish) && 'always' || 'never' }} -c.electronVersion="$(node -p 'require("electron/package.json").version')"

      # Backward-compat alias: keep `voicetree.AppImage` (no arch suffix)
      # pointing at the x64 build so existing consumers (the docker.yml
      # workflow on main, hand-downloaders, anyone with a bookmarked URL)
      # don't 404. Remove once all consumers are on the arch-suffixed names.
      - name: Publish legacy AppImage alias (x64 only)
        if: ${{ matrix.arch == 'x64' && (github.event_name == 'push' || inputs.publish) }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # electron-builder names the linux AppImage with the kernel arch
          # token (x64 -> x86_64), unlike the mac DMG (x64). Resolve the real
          # file rather than hardcoding the token so this no-arch-suffix compat
          # alias stays correct across electron-builder arch-naming.
          appimage=$(ls out/electron/voicetree-*.AppImage)
          cp "$appimage" out/electron/voicetree.AppImage
          gh release upload "v${VERSION}" out/electron/voicetree.AppImage \
            --clobber --repo voicetreelab/voicetree

      - name: Summarize failure
        if: failure()
        run: scripts/ci/write-failure-summary.sh "Linux release build failed"

  publish-release:
    needs: [check-version, build-mac, build-windows, build-linux, merge-mac-manifests]
    if: ${{ needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "Publishing release v$VERSION"
          gh release edit "v$VERSION" --draft=false --repo voicetreelab/voicetree

  update-homebrew:
    needs: [check-version, publish-release]
    if: ${{ success() && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mac-*
          path: artifacts/

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=$(jq -r .version webapp/package.json)

          # Calculate SHA256 for both DMGs
          ARM_SHA256=$(shasum -a 256 artifacts/mac-arm64/voicetree-arm64.dmg | awk '{print $1}')
          INTEL_SHA256=$(shasum -a 256 artifacts/mac-x64/voicetree-x64.dmg | awk '{print $1}')

          # Clone tap, update cask, push
          git clone https://x-access-token:${GH_TOKEN}@github.com/voicetreelab/homebrew-voicetree.git tap

          cat > tap/Casks/voicetree.rb << EOF
          cask "voicetree" do
            version "$VERSION"

            on_arm do
              sha256 "$ARM_SHA256"
              url "https://github.com/voicetreelab/voicetree/releases/download/v#{version}/voicetree-arm64.dmg"
            end

            on_intel do
              sha256 "$INTEL_SHA256"
              url "https://github.com/voicetreelab/voicetree/releases/download/v#{version}/voicetree-x64.dmg"
            end

            name "Voicetree"
            desc "Transform voice into navigable concept graphs"
            homepage "https://github.com/voicetreelab/voicetree"
            depends_on macos: ">= :monterey"
            app "Voicetree.app"

            postflight do
              system_command "/usr/bin/open", args: ["#{appdir}/Voicetree.app"]
            end

            zap trash: [
              "~/Library/Application Support/VoiceTree",
              "~/Library/Preferences/com.voicetree.webapp.plist",
            ]
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Voicetree to v$VERSION" || echo "No changes"
          git push
