name: "Stage 1: Fast Checks"

on:
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - '.github/workflows/stage1-checks.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - '.github/workflows/stage1-checks.yml'
  workflow_dispatch:

concurrency:
  group: stage1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Typecheck + Taxonomy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Lint (root targets)
        run: npm run lint

      - name: Typecheck
        working-directory: webapp
        run: npx tsc --noEmit

      - name: Blackbox test lint
        continue-on-error: true
        run: npm run lint:blackbox-tests

      - name: E2E taxonomy check
        run: npm run check:e2e-taxonomy

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run unit/integration tests
        continue-on-error: true
        run: npx vitest run --reporter=verbose

  # ── Stage 2: Tier 1 E2E (gated on Stage 1) ──────────────────────────

  browser-smoke:
    name: Browser Tier 1 Smoke
    needs: [lint-typecheck, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 1 smoke
        timeout-minutes: 10
        working-directory: webapp
        run: npx playwright test --config=playwright-ci-smoke.config.ts --reporter=line

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ci-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  electron-smoke:
    name: Electron Tier 1 Smoke
    needs: [lint-typecheck, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Build vt-fake-agent
        working-directory: tools/vt-fake-agent
        run: npm install && npx tsc

      - name: Pre-warm graph daemon (tsx JIT compile)
        run: |
          mkdir -p /tmp/daemon-warmup/.voicetree
          echo "# warmup" > /tmp/daemon-warmup/root.md
          TSX_PATH=$(node -e "console.log(require.resolve('tsx'))")
          timeout 30 node --import "$TSX_PATH" \
            packages/graph-db-server/bin/vt-graphd.ts \
            --vault /tmp/daemon-warmup --idle-timeout-ms 3000 || true
          rm -rf /tmp/daemon-warmup

      - name: Run Electron Tier 1 smoke tests
        timeout-minutes: 10
        working-directory: webapp
        env:
          CI: 'true'
          PLAYWRIGHT_QUIET: 'false'
        run: |
          xvfb-run --auto-servernum npx playwright test \
            --config=playwright-tier1-system.config.ts \
            --reporter=list

      - name: Upload Electron test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report-tier1-system/
          retention-days: 7

  # ── Stage 3: Deep Tests (PR to main only, gated on Stage 2) ─────────

  fuzz-tests:
    name: Fuzz Tests
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [browser-smoke, electron-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Run fuzz tests
        run: npx vitest run --config vitest.config.fuzz.ts --reporter=verbose

  browser-tier2:
    name: Browser Tier 2 E2E
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [browser-smoke, electron-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 2 tests
        timeout-minutes: 20
        working-directory: webapp
        run: npx playwright test --config=playwright.config.ts --reporter=line

      - name: Upload browser Tier 2 artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-tier2-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  electron-tier2:
    name: Electron Tier 2 E2E
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [browser-smoke, electron-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Run Electron Tier 2 tests
        timeout-minutes: 20
        working-directory: webapp
        env:
          CI: 'true'
        run: |
          xvfb-run --auto-servernum npx playwright test \
            --config=playwright-electron.config.ts \
            --reporter=list

      - name: Upload Electron Tier 2 artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-tier2-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  mutation-testing:
    name: Mutation Testing
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [browser-smoke, electron-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run Stryker on graph-model
        working-directory: packages/graph-model
        run: npx stryker run --reporters clear-text,json --jsonReporter.fileName ../../stryker-graph-model.json

      - name: Run Stryker on graph-state
        working-directory: packages/graph-state
        run: npx stryker run --reporters clear-text,json --jsonReporter.fileName ../../stryker-graph-state.json

      - name: Check mutation scores
        run: |
          check_score() {
            local file=$1 name=$2 threshold=$3
            if [ ! -f "$file" ]; then
              echo "WARN: $name report not found, skipping"
              return 0
            fi
            score=$(node -e "
              const r = require('./$file');
              const files = Object.values(r.files || {});
              const killed = files.reduce((s,f) => s + f.killed, 0);
              const total = files.reduce((s,f) => s + f.killed + f.survived + f.noCoverage, 0);
              console.log(total > 0 ? Math.round(killed * 100 / total) : 100);
            ")
            echo "$name mutation score: ${score}%  (threshold: ${threshold}%)"
            if [ "$score" -lt "$threshold" ]; then
              echo "FAIL: $name mutation score ${score}% is below ${threshold}% threshold"
              return 1
            fi
          }
          check_score stryker-graph-model.json graph-model 70
          check_score stryker-graph-state.json graph-state 65
