name: "Stage 1: Fast Checks"

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - '.github/workflows/stage1-checks.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - '.github/workflows/stage1-checks.yml'
  workflow_dispatch:

concurrency:
  group: stage1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Typecheck + Taxonomy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Lint (root targets)
        run: npm run lint

      - name: Typecheck
        working-directory: webapp
        run: npx tsc --noEmit

      - name: Blackbox test lint
        continue-on-error: true
        run: npm run lint:blackbox-tests

      - name: E2E taxonomy check
        run: npm run check:e2e-taxonomy

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run unit/integration tests
        continue-on-error: true
        run: npx vitest run --reporter=verbose

  # ── Stage 2: Tier 1 E2E (gated on Stage 1) ──────────────────────────

  browser-smoke:
    name: Browser Tier 1 Smoke
    needs: [lint-typecheck, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 1 smoke
        timeout-minutes: 10
        working-directory: webapp
        run: npx playwright test --config=playwright-ci-smoke.config.ts --reporter=line

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ci-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  electron-smoke:
    name: Electron Tier 1 Smoke
    needs: [lint-typecheck, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Build vt-fake-agent
        working-directory: tools/vt-fake-agent
        run: npm install && npx tsc

      - name: Pre-warm graph daemon (tsx JIT compile)
        run: |
          mkdir -p /tmp/daemon-warmup/.voicetree
          echo "# warmup" > /tmp/daemon-warmup/root.md
          TSX_PATH=$(node -e "console.log(require.resolve('tsx'))")
          timeout 30 node --import "$TSX_PATH" \
            packages/graph-db-server/bin/vt-graphd.ts \
            --vault /tmp/daemon-warmup --idle-timeout-ms 3000 || true
          rm -rf /tmp/daemon-warmup

      - name: Run Electron Tier 1 smoke tests
        timeout-minutes: 10
        working-directory: webapp
        env:
          CI: 'true'
          PLAYWRIGHT_QUIET: 'false'
        run: |
          xvfb-run --auto-servernum npx playwright test \
            --config=playwright-tier1-system.config.ts \
            --reporter=list

      - name: Upload Electron test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report-tier1-system/
          retention-days: 7

  # ── Stage 3: Fuzz Tests (gated on Stage 2) ─────────────────────────

  fuzz-tests:
    name: Fuzz Tests
    needs: [browser-smoke, electron-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Run fuzz tests
        run: npx vitest run --reporter=verbose "**/*.fuzz.test.ts"
