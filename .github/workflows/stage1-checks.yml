name: "PR CI"

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'knip.config.ts'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - 'brain'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-taxonomy:
    name: PR CI / Lint + Typecheck + Taxonomy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run lint, typecheck, and taxonomy checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --only=blackbox-tests-lint,root-lint,agent-instructions-sync,e2e-taxonomy,verify-cytoscape-rules,webapp-check,webapp-lint

  unit-integration:
    name: PR CI / Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run unit and integration checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --sequential
          --only=ci-coverage,systems-health,orange-gate,architecture-drift,relative-import-depth,relative-path-depth,agent-runtime-unit,graph-model-unit,graph-state-unit,graph-tools-unit,vt-daemon-unit,vt-fake-agent-unit,webapp-unit,graph-model-public-api-contract,graph-state-public-api-contract,graph-db-client-e2e-system,graph-db-server-e2e-system,graph-tools-e2e-system,fuzz-editor-sync,fuzz-graph-delta,fuzz-graph-state-invariants,fuzz-session-state,fuzz-system-lifecycle,graph-db-server-unit

  browser-tier-1-smoke:
    name: PR CI / Browser Tier 1 Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --only=e2e-browser-smoke,e2e-tier2-browser

  required-fuzz-tests:
    name: Fuzz Tests (${{ matrix.check_id }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        check_id:
          - fuzz-editor-sync
          - fuzz-graph-delta
          - fuzz-graph-state-invariants
          - fuzz-session-state
          - fuzz-system-lifecycle
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run required fuzz check
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --sequential
          --only=${{ matrix.check_id }}

  browser-tier-2-e2e:
    name: Browser Tier 2 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 2 E2E
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --sequential
          --only=e2e-tier2-browser

  electron-tier-2-e2e:
    name: Electron Tier 2 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run Electron Tier 2 E2E
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=3
          --sequential
          --only=e2e-tier2-electron

  electron-tier-1-smoke:
    name: PR CI / Electron Tier 1 Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run Electron smoke checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=1
          --only=e2e-tier1

  mutation-gate:
    # Cheap precheck (~30s) that decides whether the Tier 4 analyzers
    # (mutation × 2, dead-code, duplication) run on this PR. Decision is
    # load-shedding, not coverage precision:
    #
    #   added_lines < 1000           → skip
    #   added_lines >= 10000         → run
    #   1000 <= added_lines < 10000  → run iff last successful Tier 4 carrier
    #                                  (`Main CI / Full`) on main is older
    #                                  than 7 days
    #
    # Equivalent boolean:
    #   should_run = ((added_lines >= 10000) OR (stale_days > 7))
    #                AND NOT (added_lines < 1000)
    #
    # Originally landed in 3b73f12b; dropped 2h later by the tier-cutover
    # refactor (3b77af1a). Restored here on top of the tier verbs.
    name: Mutation Gate
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          LARGE_FLOOR: 1000
          LARGE_CEILING: 10000
          STALE_DAYS: 7
        run: |
          set -euo pipefail
          ADDED=$(git diff --shortstat "$BASE_SHA...$HEAD_SHA" \
                  | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          ADDED=${ADDED:-0}
          echo "PR added $ADDED lines"

          if [ "$ADDED" -lt "$LARGE_FLOOR" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=PR is small ($ADDED < $LARGE_FLOOR lines)" >> "$GITHUB_OUTPUT"
            echo "::notice title=Tier 4 skipped::PR adds $ADDED lines (< $LARGE_FLOOR floor)"
            exit 0
          fi

          if [ "$ADDED" -ge "$LARGE_CEILING" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=huge PR ($ADDED >= $LARGE_CEILING lines)" >> "$GITHUB_OUTPUT"
            echo "::notice title=Tier 4 running::huge PR ($ADDED lines)"
            exit 0
          fi

          # Walk recent main commits looking for the most recent successful
          # Tier 4 carrier. Today that's the `Main CI / Full` job in main.yml,
          # which runs Tier 4 on the nightly schedule. Stops at first hit
          # (typically <5 calls).
          LAST=""
          for sha in $(git rev-list -n 100 origin/main); do
            LAST=$(gh api "repos/$REPO/commits/$sha/check-runs" \
                   --jq '.check_runs[] | select(.name=="Main CI / Full" and .conclusion=="success") | .completed_at' \
                   | head -n1)
            [ -n "$LAST" ] && break
          done

          if [ -z "$LAST" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=no successful Main CI / Full found on main in last 100 commits" >> "$GITHUB_OUTPUT"
            echo "::notice title=Tier 4 running::no prior successful run found"
            exit 0
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$LAST" +%s) ) / 86400 ))
          echo "last successful Main CI / Full on main: $LAST (${AGE_DAYS}d ago)"

          if [ "$AGE_DAYS" -gt "$STALE_DAYS" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=stale (${AGE_DAYS}d > ${STALE_DAYS}d) and PR is $ADDED lines" >> "$GITHUB_OUTPUT"
            echo "::notice title=Tier 4 running::stale (${AGE_DAYS}d > ${STALE_DAYS}d)"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Tier 4 fresh (${AGE_DAYS}d <= ${STALE_DAYS}d) and PR under huge threshold" >> "$GITHUB_OUTPUT"
            echo "::notice title=Tier 4 skipped::fresh (${AGE_DAYS}d old)"
          fi

  tier4-conditional:
    name: Tier 4 (Conditional Pre-merge)
    needs: [mutation-gate]
    if: needs.mutation-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run Tier 4 conditional checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=4
          --sequential
          --only=mutation-graph-model,mutation-graph-state,dead-code,duplication
