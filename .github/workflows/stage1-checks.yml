name: "PR CI"

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'knip.config.ts'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - 'brain'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: PR CI / Lint + Typecheck + Taxonomy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Correctness lint checks
        run: npm run measures:capture-ci -- --folder=correctness/lint

      - name: Typecheck
        working-directory: webapp
        run: npx tsc --noEmit

      - name: Codebase health gate
        run: |
          npm run measures
          npm run measures:capture-ci -- --folder=health --quick

      - name: Codebase health tier 2
        run: npm run measures:tier2

  discover-units:
    name: PR CI / Discover Unit Measures
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.list.outputs.ids }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        run: |
          ids=$(ls packages/measures/src/correctness/unit/*.ts \
                | xargs -n1 basename | sed 's/\.ts$//' \
                | jq -R -s -c 'split("\n")|map(select(.!=""))')
          echo "ids=$ids" >> $GITHUB_OUTPUT

  unit-tests:
    name: PR CI / Unit & Integration Tests (${{ matrix.measure }})
    needs: discover-units
    strategy:
      fail-fast: false
      matrix:
        measure: ${{ fromJSON(needs.discover-units.outputs.ids) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run ${{ matrix.measure }}
        run: npm run measures:capture-ci -- --only=${{ matrix.measure }}

  unit-tests-aggregate:
    name: PR CI / Unit & Integration Tests
    needs: unit-tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify unit matrix result
        run: |
          echo "unit-tests result: ${{ needs.unit-tests.result }}"
          test "${{ needs.unit-tests.result }}" = "success"

  # Brain Workflow Tests are disabled for now. Re-enable when the brain
  # submodule check should become part of PR gating again.

  # ── Stage 2: Tier 1 E2E (gated on Stage 1) ──────────────────────────

  browser-smoke:
    name: PR CI / Browser Tier 1 Smoke
    needs: [lint-typecheck, unit-tests-aggregate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 1 smoke
        timeout-minutes: 10
        working-directory: webapp
        run: cd .. && npm run measures:capture-ci -- --only=e2e-browser-smoke

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ci-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  electron-smoke:
    name: PR CI / Electron Tier 1 Smoke
    needs: [lint-typecheck, unit-tests-aggregate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Build vt-fake-agent
        working-directory: tools/vt-fake-agent
        run: npm install && npx tsc

      - name: Pre-warm graph daemon (tsx JIT compile)
        run: |
          mkdir -p /tmp/daemon-warmup/.voicetree
          echo "# warmup" > /tmp/daemon-warmup/root.md
          TSX_PATH=$(node -e "console.log(require.resolve('tsx'))")
          timeout 30 node --import "$TSX_PATH" \
            packages/systems/graph-db-server/bin/vt-graphd.ts \
            --vault /tmp/daemon-warmup --idle-timeout-ms 3000 || true
          rm -rf /tmp/daemon-warmup

      - name: Run Electron Tier 1 smoke tests
        timeout-minutes: 10
        working-directory: webapp
        env:
          CI: 'true'
          PLAYWRIGHT_QUIET: 'false'
        run: cd .. && xvfb-run --auto-servernum npm run measures:capture-ci -- --only=e2e-tier1

      - name: Upload Electron test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-results
          path: |
            webapp/test-results/
            webapp/playwright-report-tier1-system/
          retention-days: 7

  # ── Stage 3: Deep tests (gated on Stage 1 jobs via `needs:`) ─────────

  discover-fuzz:
    name: Discover Fuzz Measures
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.list.outputs.ids }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        run: |
          ids=$(ls packages/measures/src/correctness/slow/fuzz/*.ts \
                | xargs -n1 basename | sed 's/\.ts$//' \
                | jq -R -s -c 'split("\n")|map(select(.!=""))')
          echo "ids=$ids" >> $GITHUB_OUTPUT

  fuzz-tests:
    name: Fuzz Tests (${{ matrix.measure }})
    if: github.base_ref == 'main'
    needs: [lint-typecheck, unit-tests-aggregate, discover-fuzz]
    strategy:
      fail-fast: false
      matrix:
        measure: ${{ fromJSON(needs.discover-fuzz.outputs.ids) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Run ${{ matrix.measure }}
        run: npm run measures:capture-ci -- --only=${{ matrix.measure }}

  browser-tier2:
    name: Browser Tier 2 E2E
    if: github.base_ref == 'main'
    needs: [browser-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 2 tests
        timeout-minutes: 20
        working-directory: webapp
        run: cd .. && npm run measures:capture-ci -- --only=e2e-tier2-browser

      - name: Upload browser Tier 2 artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-tier2-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  electron-tier2:
    name: Electron Tier 2 E2E
    if: github.base_ref == 'main'
    needs: [electron-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron app
        working-directory: webapp
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        working-directory: webapp
        run: npx @electron/rebuild --only node-pty,electron-trackpad-detect

      - name: Build vt-fake-agent
        working-directory: tools/vt-fake-agent
        run: npm install && npx tsc

      - name: Pre-warm graph daemon (tsx JIT compile)
        run: |
          mkdir -p /tmp/daemon-warmup/.voicetree
          echo "# warmup" > /tmp/daemon-warmup/root.md
          TSX_PATH=$(node -e "console.log(require.resolve('tsx'))")
          timeout 30 node --import "$TSX_PATH" \
            packages/systems/graph-db-server/bin/vt-graphd.ts \
            --vault /tmp/daemon-warmup --idle-timeout-ms 3000 || true
          rm -rf /tmp/daemon-warmup

      - name: Run Electron Tier 2 tests
        timeout-minutes: 30
        working-directory: webapp
        env:
          CI: 'true'
          PLAYWRIGHT_QUIET: 'false'
        run: cd .. && xvfb-run --auto-servernum npm run measures:capture-ci -- --only=e2e-tier2-electron

      - name: Upload Electron Tier 2 artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-tier2-results
          path: |
            webapp/test-results/
            webapp/playwright-report/
          retention-days: 7

  mutation-gate:
    # Cheap precheck (~30s) that decides whether the 45-min mutation-testing
    # job runs on this PR. Decision is load-shedding, not coverage precision:
    #
    #   added_lines < 1000           → skip
    #   added_lines >= 10000         → run
    #   1000 <= added_lines < 10000  → run iff last successful Mutation
    #                                  Testing on main is older than 7 days
    #
    # Equivalent boolean:
    #   should_run = ((added_lines >= 10000) OR (stale_days > 7))
    #                AND NOT (added_lines < 1000)
    name: Mutation Gate
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          LARGE_FLOOR: 1000
          LARGE_CEILING: 10000
          STALE_DAYS: 7
        run: |
          set -euo pipefail
          ADDED=$(git diff --shortstat "$BASE_SHA...$HEAD_SHA" \
                  | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          ADDED=${ADDED:-0}
          echo "PR added $ADDED lines"

          if [ "$ADDED" -lt "$LARGE_FLOOR" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=PR is small ($ADDED < $LARGE_FLOOR lines)" >> "$GITHUB_OUTPUT"
            echo "::notice title=Mutation skipped::PR adds $ADDED lines (< $LARGE_FLOOR floor)"
            exit 0
          fi

          if [ "$ADDED" -ge "$LARGE_CEILING" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=huge PR ($ADDED >= $LARGE_CEILING lines)" >> "$GITHUB_OUTPUT"
            echo "::notice title=Mutation running::huge PR ($ADDED lines)"
            exit 0
          fi

          # Walk recent main commits looking for the most recent successful
          # Mutation Testing check-run. Stops at first hit (typically <5 calls).
          LAST=""
          for sha in $(git rev-list -n 100 origin/main); do
            LAST=$(gh api "repos/$REPO/commits/$sha/check-runs" \
                   --jq '.check_runs[] | select(.name=="Mutation Testing" and .conclusion=="success") | .completed_at' \
                   | head -n1)
            [ -n "$LAST" ] && break
          done

          if [ -z "$LAST" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=no successful Mutation Testing found on main in last 100 commits" >> "$GITHUB_OUTPUT"
            echo "::notice title=Mutation running::no prior successful run found"
            exit 0
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$LAST" +%s) ) / 86400 ))
          echo "last successful Mutation Testing on main: $LAST (${AGE_DAYS}d ago)"

          if [ "$AGE_DAYS" -gt "$STALE_DAYS" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=stale (${AGE_DAYS}d > ${STALE_DAYS}d) and PR is $ADDED lines" >> "$GITHUB_OUTPUT"
            echo "::notice title=Mutation running::stale (${AGE_DAYS}d > ${STALE_DAYS}d)"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=mutation fresh (${AGE_DAYS}d <= ${STALE_DAYS}d) and PR under huge threshold" >> "$GITHUB_OUTPUT"
            echo "::notice title=Mutation skipped::fresh (${AGE_DAYS}d old)"
          fi

  mutation-testing:
    name: Mutation Testing
    if: needs.mutation-gate.outputs.should_run == 'true'
    needs: [mutation-gate, lint-typecheck, unit-tests-aggregate]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run Stryker on graph-model
        working-directory: packages/libraries/graph-model
        run: npx stryker run

      - name: Run Stryker on graph-state
        working-directory: packages/libraries/graph-state
        run: npx stryker run

      - name: Check mutation scores
        run: |
          check_score() {
            local file=$1 name=$2 threshold=$3
            if [ ! -f "$file" ]; then
              echo "WARN: $name report not found, skipping"
              return 0
            fi
            score=$(node -e "
              const r = require('./$file');
              const files = Object.values(r.files || {});
              const killed = files.reduce((s,f) => s + f.killed, 0);
              const total = files.reduce((s,f) => s + f.killed + f.survived + f.noCoverage, 0);
              console.log(total > 0 ? Math.round(killed * 100 / total) : 100);
            ")
            echo "$name mutation score: ${score}%  (threshold: ${threshold}%)"
            if [ "$score" -lt "$threshold" ]; then
              echo "FAIL: $name mutation score ${score}% is below ${threshold}% threshold"
              return 1
            fi
          }
          check_score stryker-graph-model.json graph-model 70
          check_score stryker-graph-state.json graph-state 65
