name: "PR CI"

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'knip.config.ts'
      - 'packages/**'
      - 'webapp/**'
      - 'scripts/**'
      - 'brain'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-taxonomy:
    name: PR CI / Lint + Typecheck + Taxonomy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run lint, typecheck, and taxonomy checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=1
          --only=blackbox-tests-lint,root-lint,agent-instructions-sync,e2e-taxonomy,verify-cytoscape-rules,webapp-check,webapp-lint

  unit-integration:
    name: PR CI / Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run unit and integration checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --sequential
          --only=ci-coverage,systems-health,orange-gate,relative-import-depth,relative-path-depth,agent-runtime-unit,graph-model-unit,graph-state-unit,graph-tools-unit,voicetree-mcp-unit,vt-fake-agent-unit,webapp-unit,graph-model-public-api-contract,graph-state-public-api-contract,graph-db-client-e2e-system,graph-db-server-e2e-system,graph-tools-e2e-system,fuzz-editor-sync,fuzz-graph-delta,fuzz-graph-state-invariants,fuzz-session-state,fuzz-system-lifecycle,graph-db-server-unit

  browser-tier-1-smoke:
    name: PR CI / Browser Tier 1 Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --only=e2e-browser-smoke,e2e-tier2-browser

  required-fuzz-tests:
    name: Fuzz Tests (${{ matrix.check_id }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        check_id:
          - fuzz-editor-sync
          - fuzz-graph-delta
          - fuzz-graph-state-invariants
          - fuzz-session-state
          - fuzz-system-lifecycle
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run required fuzz check
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --sequential
          --only=${{ matrix.check_id }}

  browser-tier-2-e2e:
    name: Browser Tier 2 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run browser Tier 2 E2E
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=2
          --sequential
          --only=e2e-tier2-browser

  electron-tier-2-e2e:
    name: Electron Tier 2 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run Electron Tier 2 E2E
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=3
          --sequential
          --only=e2e-tier2-electron

  electron-tier-1-smoke:
    name: PR CI / Electron Tier 1 Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Install Playwright chromium
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run Electron smoke checks
        run: >
          node --no-warnings=ExperimentalWarning --experimental-strip-types
          packages/measures/src/_runners/capture-ci-checks.ts
          --tier-max=1
          --only=e2e-tier1
