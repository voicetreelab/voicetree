name: Sync dev into dev-manu

on:
  push:
    branches:
      - dev
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-dev-into-dev-manu
  cancel-in-progress: false

jobs:
  merge-dev:
    name: Merge dev into dev-manu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-manu
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "voicetree-sync-bot"
          git config user.email "actions@github.com"

      - name: Merge dev into dev-manu
        run: scripts/git/sync-dev-into-dev-manu.sh
