auth_enabled: false

server:
  http_listen_address: 127.0.0.1
  http_listen_port: 2998
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 2992

common:
  instance_addr: 127.0.0.1
  path_prefix: infra/perf-stack/storage/loki
  storage:
    filesystem:
      chunks_directory: infra/perf-stack/storage/loki/chunks
      rules_directory: infra/perf-stack/storage/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true

ruler:
  alertmanager_url: http://127.0.0.1:9093

pattern_ingester:
  lifecycler:
    min_ready_duration: 1s

ingester:
  lifecycler:
    min_ready_duration: 1s

frontend:
  scheduler_dns_lookup_period: 1s
  address: 127.0.0.1

query_scheduler:
  use_scheduler_ring: false
