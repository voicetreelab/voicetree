server:
  http_listen_address: 127.0.0.1
  http_listen_port: 3200
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 127.0.0.1:4327
        http:
          endpoint: 127.0.0.1:4328

ingester:
  trace_idle_period: 1s
  max_block_duration: 1s
  flush_check_period: 1s
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    min_ready_duration: 1s

memberlist:
  bind_addr: [127.0.0.1]
  bind_port: 7947

querier:
  frontend_worker:
    frontend_address: 127.0.0.1:9096

storage:
  trace:
    backend: local
    block:
      parquet_dedicated_columns:
        - name: service.name
          type: string
          scope: resource
        - name: service.instance.id
          type: string
          scope: resource
    wal:
      path: infra/perf-stack/storage/tempo/wal
    local:
      path: infra/perf-stack/storage/tempo/blocks
