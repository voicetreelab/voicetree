server:
  http_listen_address: 127.0.0.1
  http_listen_port: 4040
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 9097

metastore:
  address: 127.0.0.1:9097
  min_ready_duration: 1s
  data_dir: infra/perf-stack/storage/pyroscope/metastore/data
  raft:
    dir: infra/perf-stack/storage/pyroscope/metastore/raft
    snapshots_dir: infra/perf-stack/storage/pyroscope/metastore/raft

architecture_storage: v2

limits:
  write_path: segment-writer

storage:
  backend: filesystem
  filesystem:
    dir: infra/perf-stack/storage/pyroscope/shared

distributor:
  ring:
    kvstore:
      store: inmemory

segment_writer:
  lifecycler:
    min_ready_duration: 1s

query_backend:
  address: 127.0.0.1:9097
